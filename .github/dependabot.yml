version: 2
updates:
  - package-ecosystem: "pip"
    # Test whether Dependabot can handle the pip-compile layout when it sees
    # both requirements/*.in inputs and requirements/*.txt outputs.
    directory: "/requirements"
    schedule:
      interval: "cron"
      cronjob: "0 0 * * *"
    groups:
      pip-minor-patch-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      pip-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
