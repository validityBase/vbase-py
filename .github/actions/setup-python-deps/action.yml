name: Setup Python dependencies
description: >
  Cache pip and install requirements. The cache key uses the Python major.minor
  string (not pythonLocation paths) plus hashes of requirement files that this
  action installs. Workflows must use this action rather than inline pip steps.
inputs:
  install-docs-first:
    description: If true, install docs/requirements.txt before requirements.txt
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Determine Python version
      id: python-version
      shell: bash
      run: |
        echo "version=$(python -c 'import sys; print(sys.version_info[0], sys.version_info[1], sep=".")')" >> "$GITHUB_OUTPUT"

    - name: Cache pip
      # v5 — pin SHA (tag moves); see https://github.com/actions/cache/releases/tag/v5
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ steps.python-version.outputs.version }}-${{ hashFiles('requirements.txt', 'docs/requirements.txt') }}-v2
        restore-keys: |
          ${{ runner.os }}-pip-${{ steps.python-version.outputs.version }}-

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ "${{ inputs.install-docs-first }}" = "true" ]; then
          python -m pip install -r docs/requirements.txt
        fi
        python -m pip install -r requirements.txt
