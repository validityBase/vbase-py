name: Setup Python dependencies
description: >
  Cache pip and install requirements. The cache key is defined here as the single
  source of truth — workflows must use this action rather than inline pip steps.
inputs:
  install-docs-first:
    description: If true, install docs/requirements.txt before requirements.txt
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Cache pip
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ env.pythonLocation }}-${{ hashFiles('requirements.txt', 'docs/requirements.txt', 'requirements-dev.txt') }}-v2
        restore-keys: |
          ${{ runner.os }}-pip-${{ env.pythonLocation }}-
          ${{ runner.os }}-pip-
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ "${{ inputs.install-docs-first }}" = "true" ]; then
          python -m pip install -r docs/requirements.txt
        fi
        python -m pip install -r requirements.txt
