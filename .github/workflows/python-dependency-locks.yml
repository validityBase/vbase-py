name: Python Dependency Locks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-locks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install lock tooling
        uses: validityBase/vbase-github-actions/.github/actions/setup-python-deps@v1
        with:
          requirements-files: |
            requirements/lock/tools.txt
          python-version: "3.11"
          require-hashes: "true"

      - name: Verify generated lock files are current
        run: |
          pip-compile --strip-extras --no-annotate --allow-unsafe --generate-hashes -o requirements/lock/dev.txt requirements/src/dev.in
          pip-compile --strip-extras --no-annotate --generate-hashes -o requirements/lock/test.txt requirements/src/test.in
          pip-compile --strip-extras --no-annotate --generate-hashes -o requirements/lock/docs.txt requirements/src/docs.in
          pip-compile --strip-extras --no-annotate --allow-unsafe --generate-hashes -o requirements/lock/tools.txt requirements/src/tools.in
          git diff --exit-code -- requirements/lock/dev.txt requirements/lock/test.txt requirements/lock/docs.txt requirements/lock/tools.txt

      - name: Install test dependencies
        uses: validityBase/vbase-github-actions/.github/actions/setup-python-deps@v1
        with:
          requirements-files: |
            requirements/lock/test.txt
          python-version: "3.11"
          require-hashes: "true"

      - name: Install package locally
        run: python -m pip install --no-deps --no-build-isolation -e .

      - name: Check installed dependencies
        run: python -m pip check
