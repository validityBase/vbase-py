name: Run Setup Matrix

on:
  pull_request:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-setup-matrix:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # actions/checkout v5.0.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.in

      - name: Install dependencies
        run: |
          python -m pip install "setuptools>=77.0.3" "wheel>=0.45.1"
          python -m pip install -r requirements.in

      - name: Install package
        run: |
          python -m pip install --no-deps --no-build-isolation -e .

      - name: Check installed dependencies
        run: |
          python -m pip check

      - name: Run portable import check
        run: |
          python -c "import importlib.metadata as metadata; import vbase; print('vbase ' + metadata.version('vbase') + ' imported from ' + vbase.__file__)"
